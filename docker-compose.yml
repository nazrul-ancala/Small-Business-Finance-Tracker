services:

  # ── PHP-FPM workers (not exposed to host) ──────────────────────────────────

  duitbuku-php:
    build:
      context: ./DuitBuku
      dockerfile: Dockerfile
    container_name: duitbuku-php
    volumes:
      - ./DuitBuku:/var/www/html
      - duitbuku-vendor:/var/www/html/vendor   # image-baked vendor shadows slow host mount
    networks:
      - bfcs-network

  duitbuku-api-php:
    build:
      context: ./DuitBuku-api
      dockerfile: Dockerfile
    container_name: duitbuku-api-php
    volumes:
      - ./DuitBuku-api:/var/www/html
      - duitbuku-api-vendor:/var/www/html/vendor
    networks:
      - bfcs-network

  # ── Nginx reverse proxies (exposed to host) ────────────────────────────────

  duitbuku-web:
    image: nginx:alpine
    container_name: duitbuku-web
    ports:
      - "8080:80"
    volumes:
      - ./DuitBuku:/var/www/html
      - duitbuku-vendor:/var/www/html/vendor
      - ./docker/nginx/app.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - duitbuku-php
    networks:
      - bfcs-network

  duitbuku-api-web:
    image: nginx:alpine
    container_name: duitbuku-api-web
    ports:
      - "8081:80"
    volumes:
      - ./DuitBuku-api:/var/www/html
      - duitbuku-api-vendor:/var/www/html/vendor
      - ./docker/nginx/api.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - duitbuku-api-php
    networks:
      - bfcs-network

  # ── MySQL database ─────────────────────────────────────────────────────────

  duitbuku-db:
    image: mysql:8.0
    container_name: duitbuku-db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-secret}
      MYSQL_DATABASE: ${DB_DATABASE:-duitbuku}
      MYSQL_USER: ${DB_USERNAME:-duitbuku}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "3306:3306"
    volumes:
      - duitbuku-db-data:/var/lib/mysql
    networks:
      - bfcs-network

  # ── Vite dev servers ───────────────────────────────────────────────────────

  duitbuku-vite:
    image: node:22-alpine
    container_name: duitbuku-vite
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "5173:5173"
    volumes:
      - ./DuitBuku:/app
    networks:
      - bfcs-network

  duitbuku-api-vite:
    image: node:22-alpine
    container_name: duitbuku-api-vite
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "5174:5174"
    volumes:
      - ./DuitBuku-api:/app
    networks:
      - bfcs-network

volumes:
  duitbuku-vendor:
  duitbuku-api-vendor:
  duitbuku-db-data:

networks:
  bfcs-network:
    driver: bridge
